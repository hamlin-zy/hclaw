name: Build & Release

on:
  # 仅在推送匹配 v* 的 tag 时自动构建并发布
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  # 也支持手动触发
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - darwin
          - win32
          - linux

permissions:
  contents: write

env:
  SIGN_MACOS: false
  APPLE_TEAM_ID: ''
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ============================================
  # 创建草稿 Release（仅 tag push 时执行）
  # ============================================
  create-draft:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          RECENT_COMMITS=$(git log --pretty=format:"- %s" -n 20)
          
          cat > release_body.md << 'RELEASE_EOF'
          ## Downloads

          ### macOS (Intel)
          - `HClaw-*-x64.dmg`

          ### Windows
          - `HClaw-*-Setup.exe`

          ### Linux
          - `HClaw_*_amd64.deb`
          - `HClaw-*.AppImage`

          ---

          ## What's Changed
          RELEASE_EOF
          echo "" >> release_body.md
          echo '```' >> release_body.md
          echo "$RECENT_COMMITS" >> release_body.md
          echo '```' >> release_body.md
          echo "" >> release_body.md
          echo "_This release contains $COMMIT_COUNT commits._" >> release_body.md

      - name: Create Draft Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "HClaw v${{ steps.version.outputs.VERSION }}" \
            --notes-file release_body.md

  # ============================================
  # macOS 构建（Intel / Rosetta 2）
  # ============================================
  build-darwin:
    needs: [create-draft]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      inputs.platform == 'all' || inputs.platform == 'darwin'
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (x64)
        run: npm run make:mac
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.SIGN_MACOS }}

      - name: Upload macOS to Release
        run: |
          gh release upload "${{ github.ref_name }}" dist/*.dmg --clobber

  # ============================================
  # Windows x64 构建
  # ============================================
  build-windows:
    needs: [create-draft]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      inputs.platform == 'all' || inputs.platform == 'win32'
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run make

      - name: Upload Windows to Release
        shell: bash
        run: |
          cd dist
          gh release upload "${{ github.ref_name }}" ./*-Setup.exe --clobber || echo "No Windows installer found"

  # ============================================
  # Linux x64 构建
  # ============================================
  build-linux:
    needs: [create-draft]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 \
            xz-utils dpkg-dev fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run make:linux

      - name: Upload Linux to Release
        run: |
          gh release upload "${{ github.ref_name }}" dist/*.deb dist/*.AppImage --clobber

  # ============================================
  # 发布 Release
  # ============================================
  publish:
    needs: [build-darwin, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Publish Release
        run: |
          if [[ "${{ github.ref }}" == *-* ]]; then
            gh release edit "${{ github.ref_name }}" --draft=false --prerelease
          else
            gh release edit "${{ github.ref_name }}" --draft=false
          fi
          echo "Release v${{ needs.create-draft.outputs.version }} published!"
